<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
</head>

<body>
    <h2>Welcome, Admin</h2>

    <a th:href="@{/notifications}"
        style="display:inline-block; margin: 10px 0; background: #e0f7fa; padding: 5px 10px; border-radius: 5px; text-decoration: none; color: #006064; font-weight: bold;">
        🔔 Notifications (<span th:text="${unreadCount}"></span>)
    </a>

    <div class="mt-4">
        <a class="btn btn-info mb-2" th:href="@{/admin/profile}">
            👤 My Profile
        </a>
        <br />

        <a class="btn btn-primary mb-2" th:href="@{/admin/create-employee}">
            Create Employee
        </a>

        <a class="btn btn-secondary mb-2" th:href="@{/admin/employees}">
            View Employees
        </a>

        <a th:href="@{/admin/announcements}">
            Manage Announcements
        </a>

        <a th:href="@{/admin/leave-requests}" class="btn btn-warning mb-2">
            Manage Leave Requests
        </a>

    </div>

    <a th:href="@{/admin/events}" class="btn btn-secondary mb-2 mt-4" style="display:inline-block; margin-top:15px;">
        Manage Events
    </a>

    <hr>
    <h3>Upcoming Events</h3>
    <ul th:if="${not #lists.isEmpty(upcomingEvents)}">
        <li th:each="event : ${upcomingEvents}">
            <strong th:text="${event.eventDate}"></strong> -
            <span th:text="${event.title}"></span>
            <em th:if="${event.description != null and !event.description.isEmpty()}"
                th:text="'(' + ${event.description} + ')'"></em>
        </li>
    </ul>
    <p th:if="${#lists.isEmpty(upcomingEvents)}">No upcoming events!</p>
    <br>
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-danger">Logout</button>
    </form>
</body>

</html>
