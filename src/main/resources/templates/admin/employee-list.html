<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::head}, ~{::content}, 'employees')}">

<head>
    <title>Employee Management | RevWorkforce</title>
</head>

<body>
    <div th:fragment="content">
        <div class="row align-items-center mb-4">
            <div class="col-md-6 text-md-start">
                <h2 class="mb-0">Employee Directory</h2>
                <p class="text-secondary mb-0">Manage workforce accounts and organizational structure</p>
            </div>
            <div class="col-md-6 text-md-end">
                <a th:href="@{/admin/create-employee}" class="btn btn-primary shadow-sm">
                    <i class="fas fa-plus me-2"></i> Register New Employee
                </a>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Employee Name</th>
                            <th>Contact / Email</th>
                            <th>Role & Designation</th>
                            <th>Department</th>
                            <th>Reporting Manager</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="stat-icon bg-light text-primary me-3"
                                        style="width: 32px; height: 32px; font-size: 0.8rem;">
                                        <i class="fas fa-user"></i>
                                    </div>
                                    <span class="font-bold" th:text="${emp.firstName + ' ' + emp.lastName}"></span>
                                </div>
                            </td>
                            <td>
                                <div class="text-sm font-bold" th:text="${emp.user.email}"></div>
                                <div class="text-xs text-secondary" th:text="${emp.phone}"></div>
                            </td>
                            <td>
                                <span class="badge bg-soft-primary text-primary text-xs"
                                    th:text="${emp.user.role}"></span>
                                <div class="text-xs text-secondary mt-1 text-uppercase" th:text="${emp.designation}">
                                </div>
                            </td>
                            <td class="text-sm" th:text="${emp.department?.departmentName}"></td>
                            <td>
                                <span th:if="${emp.manager != null}" class="text-sm">
                                    <i class="fas fa-user-tie text-secondary me-1"></i>
                                    <span th:text="${emp.manager.firstName + ' ' + emp.manager.lastName}"></span>
                                </span>
                                <span th:if="${emp.manager == null}" class="text-xs text-muted">No Manager
                                    Assigned</span>
                            </td>
                            <td>
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{/admin/manager/{id}(id=${emp.empId})}"
                                        class="btn btn-sm btn-outline-info" title="Assign Manager">
                                        <i class="fas fa-sitemap"></i>
                                    </a>
                                    <a th:href="@{/admin/delete/{id}(id=${emp.empId})}"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Are you sure you want to delete this employee? This action cannot be undone.')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employees)}">
                            <td colspan="6" class="text-center py-5 text-secondary">
                                No employees found in the directory.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <style>
            .bg-soft-primary {
                background-color: rgba(37, 99, 235, 0.1);
            }
        </style>
    </div>
</body>

</html>
