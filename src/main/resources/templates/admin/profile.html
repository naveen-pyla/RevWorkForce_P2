<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::head}, ~{::content}, 'profile')}">

<head>
    <title>Administrator Profile | System Control</title>
</head>

<body>
    <div th:fragment="content">
        <div class="row g-4">
            <!-- Left Column: Primary Identity -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-4 overflow-hidden rounded-4">
                    <div class="card-header bg-dark py-5 text-center shadow-lg">
                        <div class="stat-icon bg-warning text-dark mx-auto mb-3 shadow"
                            style="width: 100px; height: 100px; font-size: 3rem; border: 4px solid rgba(255,255,255,0.2);">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <h4 class="text-white fw-bold mb-1" th:text="${employee.firstName + ' ' + employee.lastName}">
                            Root Admin</h4>
                        <p class="text-warning-emphasis mb-0 d-flex align-items-center justify-content-center fw-bold">
                            <i class="fas fa-user-shield me-2"></i>
                            <span th:text="${employee.designation}">System Administrator</span>
                        </p>
                    </div>
                    <div class="card-body p-4">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item px-0 py-3 bg-transparent border-bottom">
                                <span class="d-block text-xs font-bold text-uppercase text-secondary mb-1">SYSTEM
                                    EMAIL</span>
                                <span class="font-bold text-dark"
                                    th:text="${employee.user.email}">admin@revworkforce.com</span>
                            </li>
                            <li class="list-group-item px-0 py-3 bg-transparent border-bottom">
                                <span
                                    class="d-block text-xs font-bold text-uppercase text-secondary mb-1">OPERATIONS</span>
                                <span class="badge bg-warning text-dark px-3 py-2"
                                    th:text="${employee.department != null ? employee.department.departmentName : 'GLOBAL'}">Management</span>
                            </li>
                            <li class="list-group-item px-0 py-3 bg-transparent">
                                <span class="d-block text-xs font-bold text-uppercase text-secondary mb-1">TENURE
                                    START</span>
                                <span class="font-bold text-dark"
                                    th:text="${#temporals.format(employee.joiningDate, 'MMMM dd, yyyy')}">January 01,
                                    2020</span>
                            </li>
                        </ul>
                    </div>
                </div>


            </div>

            <!-- Right Column: Details & Edits -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-header bg-white py-4 border-bottom px-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0 font-bold text-dark"><i class="fas fa-fingerprint text-warning me-2"></i>
                                Profile Authentication Details</h5>
                            <span
                                class="badge bg-dark text-warning border-warning border px-3 py-2 rounded-pill font-bold">
                                <i class="fas fa-power-off me-1"></i> STATUS: [[${employee.status}]]
                            </span>
                        </div>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/admin/profile/update}" method="post">
                            <div class="row g-4 mb-5">
                                <div class="col-md-6 text-md-start">
                                    <div class="p-4 bg-light rounded-4 h-100 border">
                                        <label
                                            class="form-label font-bold text-xs text-secondary text-uppercase mb-2">Internal
                                            SID</label>
                                        <div class="h5 font-bold mb-0 text-dark">#ADMIN-[[${employee.empId}]]</div>
                                    </div>
                                </div>
                                <div class="col-md-6 text-md-start">
                                    <div class="p-4 bg-light rounded-4 h-100 border">
                                        <label
                                            class="form-label font-bold text-xs text-secondary text-uppercase mb-2">Access
                                            Tier</label>
                                        <div class="h5 font-bold mb-0 text-dark" th:text="${employee.user.role}">ADMIN
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label font-bold text-sm text-secondary text-uppercase"><i
                                        class="fas fa-phone-square me-2"></i> Secure Contact</label>
                                <div class="input-group input-group-lg shadow-sm">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="fas fa-phone text-warning"></i></span>
                                    <input type="text" name="phone" class="form-control border-start-0 font-bold"
                                        th:value="${employee.phone}" required />
                                </div>
                            </div>

                            <div class="mb-5">
                                <label class="form-label font-bold text-sm text-secondary text-uppercase"><i
                                        class="fas fa-map-marked-alt me-2"></i> Office Local / Address</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="fas fa-home text-warning"></i></span>
                                    <textarea name="address" class="form-control border-start-0" rows="3" required
                                        th:text="${employee.address}"></textarea>
                                </div>
                            </div>

                            <div class="pt-4 border-top">
                                <button type="submit" class="btn btn-dark px-5 py-3 shadow font-bold text-uppercase">
                                    <i class="fas fa-sync me-2 text-warning"></i> Push Profile Updates
                                </button>
                                <a th:href="@{/admin/dashboard}"
                                    class="btn btn-link text-secondary text-decoration-none ms-3">Back to Control
                                    Center</a>
                            </div>
                        </form>
                        <div class="mt-4 pt-3 border-top text-xs text-muted">
                            <i class="fas fa-info-circle me-1"></i> System Registration:
                            <span th:text="${#temporals.format(employee.createdDate, 'dd MMM yyyy HH:mm')}"></span>
                            <span th:if="${employee.lastModifiedDate != null}" class="ms-3">
                                <i class="fas fa-history me-1"></i> Last System Update:
                                <span
                                    th:text="${#temporals.format(employee.lastModifiedDate, 'dd MMM yyyy HH:mm')}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
