<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::head}, ~{::content}, 'manage-leaves')}">

<head>
    <title>Global Approvals | Admin Portal</title>
</head>

<body>
    <div th:fragment="content">
        <div class="mb-4">
            <h2 class="mb-0">System Wide Leave Approvals</h2>
            <p class="text-secondary mb-0">Review pending time-off requests across all departments.</p>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Employee Details</th>
                                <th>Leave Details</th>
                                <th>Reasoning</th>
                                <th class="pe-4 text-end">Action Panel</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="leave : ${leaves}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center">
                                        <div class="stat-icon bg-info-subtle text-info me-3"
                                            style="width: 42px; height: 42px; border: 1px dashed rgba(0,0,0,0.1);">
                                            <i class="fas fa-id-card"></i>
                                        </div>
                                        <div>
                                            <span class="font-bold d-block text-dark"
                                                th:text="${leave.employee.firstName + ' ' + leave.employee.lastName}">John
                                                Smith</span>
                                            <span class="text-xs text-secondary d-flex align-items-center">
                                                <i class="fas fa-building me-1 opacity-50"></i>
                                                <span
                                                    th:text="${leave.employee.department.departmentName}">Marketing</span>
                                            </span>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <div class="stat-label mb-1">
                                        <span class="badge bg-light text-dark border px-2 py-1 rounded"
                                            th:text="${leave.leaveType.leaveName}">SICK LEAVE</span>
                                    </div>
                                    <div class="text-sm font-bold">
                                        <span th:text="${leave.startDate}">2023-10-01</span>
                                        <i class="fas fa-arrow-right mx-1 text-secondary opacity-50"></i>
                                        <span th:text="${leave.endDate}">2023-10-05</span>
                                    </div>
                                    <div class="text-xs text-muted mt-1">
                                        Applied: <span
                                            th:text="${#temporals.format(leave.createdDate, 'dd MMM yyyy')}"></span>
                                    </div>
                                </td>
                                <td>
                                    <div class="text-sm text-secondary italic border-start ps-2"
                                        th:text="${#strings.abbreviate(leave.reason, 50)}">
                                        "Looking for approval..."
                                    </div>
                                </td>
                                <td class="pe-4 text-end">
                                    <div class="btn-group shadow-sm">
                                        <form th:action="@{/admin/leave/approve}" method="post" class="m-0">
                                            <input type="hidden" name="leaveId" th:value="${leave.leaveId}" />
                                            <button type="submit" class="btn btn-sm btn-success px-3">
                                                <i class="fas fa-check-circle"></i> Approve
                                            </button>
                                        </form>

                                        <button class="btn btn-sm btn-danger px-3" type="button"
                                            th:onclick="'document.getElementById(\'admin-reject-' + ${leave.leaveId} + '\').classList.toggle(\'d-none\')'">
                                            <i class="fas fa-times-circle"></i> Reject
                                        </button>
                                    </div>

                                    <!-- Comment box for Admin Rejection -->
                                    <div th:id="'admin-reject-' + ${leave.leaveId}"
                                        class="d-none mt-2 text-start p-3 bg-light border border-danger-subtle rounded-3">
                                        <form th:action="@{/admin/leave/reject}" method="post">
                                            <input type="hidden" name="leaveId" th:value="${leave.leaveId}" />
                                            <label class="text-xs font-bold text-danger mb-1">SPECIFY REASON FOR ADMIN
                                                REJECTION:</label>
                                            <textarea name="managerComment" class="form-control form-control-sm mb-2"
                                                rows="2" required></textarea>
                                            <div class="d-flex gap-2 justify-content-end">
                                                <button type="button" class="btn btn-xs btn-light"
                                                    th:onclick="'document.getElementById(\'admin-reject-' + ${leave.leaveId} + '\').classList.add(\'d-none\')'">Cancel</button>
                                                <button type="submit"
                                                    class="btn btn-xs btn-danger px-3 font-bold">Confirm Reject</button>
                                            </div>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(leaves)}">
                                <td colspan="4" class="text-center py-5 text-secondary">
                                    <i class="fas fa-calendar-check mb-3 fs-1 d-block opacity-25"></i>
                                    Excellent! There are no pending leave requests to process.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
