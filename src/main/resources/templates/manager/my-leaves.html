<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::head}, ~{::content}, 'my-leaves')}">

<head>
    <title>My Leave History | Manager Portal</title>
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0">Personal Leave History</h2>
                <p class="text-secondary mb-0">Track your personal leave requests and their current status</p>
            </div>
            <a th:href="@{/manager/apply-leave}" class="btn btn-primary shadow-sm">
                <i class="fas fa-plus me-2"></i> Request Leave
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Leave Type</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th class="pe-4 text-end">Applied On</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="l : ${leaves}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center">
                                        <div class="stat-icon bg-light-subtle text-primary border border-primary-subtle me-3"
                                            style="width: 40px; height: 40px;">
                                            <i class="fas fa-calendar-alt"></i>
                                        </div>
                                        <div>
                                            <span class="font-bold d-block text-dark"
                                                th:text="${l.leaveType.leaveName}">Casual Leave</span>
                                            <span class="text-xs text-secondary"
                                                th:text="${#strings.abbreviate(l.reason, 30)}">Family occasion...</span>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="font-bold" th:text="${l.startDate}">2023-10-01</span>
                                    <span class="mx-2 text-secondary">to</span>
                                    <span class="font-bold" th:text="${l.endDate}">2023-10-05</span>
                                </td>
                                <td>
                                    <span th:if="${l.status == 'PENDING'}"
                                        class="badge bg-warning-subtle text-warning border border-warning-subtle px-3 py-2 rounded-pill fw-bold">
                                        <i class="fas fa-clock me-1"></i> PENDING
                                    </span>
                                    <span th:if="${l.status == 'APPROVED'}"
                                        class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2 rounded-pill fw-bold">
                                        <i class="fas fa-check-circle me-1"></i> APPROVED
                                    </span>
                                    <span th:if="${l.status == 'REJECTED'}"
                                        class="badge bg-danger-subtle text-danger border border-danger-subtle px-3 py-2 rounded-pill fw-bold">
                                        <i class="fas fa-times-circle me-1"></i> REJECTED
                                    </span>
                                </td>
                                <td class="pe-4 text-end text-sm text-secondary"
                                    th:text="${l.appliedOn != null ? #temporals.format(l.appliedOn, 'MMM dd, yyyy') : 'N/A'}">
                                    Oct 01, 2023</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
