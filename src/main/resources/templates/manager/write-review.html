<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Write Performance Review</title>
</head>

<body>
    <h2>Write Performance Review</h2>

    <p style="color:red;" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/manager/write-review}" th:object="${review}" method="post">

        <div class="mb-3">
            <label class="form-label">Select Employee:</label>
            <select name="employeeId" class="form-select" required>
                <option value="">-- Select an Employee --</option>
                <option th:each="emp : ${employees}" th:value="${emp.empId}"
                    th:text="${emp.firstName + ' ' + emp.lastName}" th:selected="${emp.empId == employeeId}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Review Year:</label>
            <input type="number" class="form-control" th:field="*{year}" />
            <div class="text-danger" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Rating (1-5):</label>
            <input type="number" class="form-control" th:field="*{rating}" />
            <div class="text-danger" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Manager Comments:</label>
            <textarea class="form-control" th:field="*{comments}" rows="4"
                placeholder="How was the employee's performance?"></textarea>
            <div class="text-danger" th:if="${#fields.hasErrors('comments')}" th:errors="*{comments}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Submit Performance Review</button>
    </form>

    <br>
    <a th:href="@{/manager/dashboard}">Back to Dashboard</a>
</body>

</html>
