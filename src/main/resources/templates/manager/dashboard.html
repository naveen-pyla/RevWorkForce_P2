<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::head}, ~{::content}, 'dashboard')}">

<head>
    <title>Manager Dashboard | RevWorkforce</title>
</head>

<body>
    <div th:fragment="content">
        <div class="row align-items-center mb-4">
            <div class="col-md-6 text-md-start">
                <h2 class="mb-0">Management Portal</h2>
                <p class="text-secondary mb-0">Review team performance and manage leave approvals</p>
            </div>
            <div class="col-md-6 text-md-end">
                <div class="btn-group">
                    <a th:href="@{/manager/assign-goal}" class="btn btn-primary shadow-sm">
                        <i class="fas fa-bullseye me-2"></i> Assign Goal
                    </a>
                    <a th:href="@{/manager/write-review}" class="btn btn-outline-primary shadow-sm ms-2">
                        <i class="fas fa-edit me-2"></i> Write Review
                    </a>
                </div>
            </div>
        </div>

        <!-- Quick Stats Row -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stat-card border-start border-primary border-4">
                    <div class="stat-icon bg-primary text-white">
                        <i class="fas fa-user-clock"></i>
                    </div>
                    <div>
                        <div class="stat-label">Pending Team Leaves</div>
                        <a th:href="@{/manager/leave-requests}"
                            class="text-xs text-primary font-bold text-decoration-none">REVIEW PENDING</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card border-start border-info border-4">
                    <div class="stat-icon bg-info text-white">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                    <div>
                        <div class="stat-label">My Leave Status</div>
                        <a th:href="@{/manager/my-leaves}"
                            class="text-xs text-info font-bold text-decoration-none">CHECK MY HISTORY</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card border-start border-warning border-4">
                    <div class="stat-icon bg-warning text-white">
                        <i class="fas fa-bullhorn"></i>
                    </div>
                    <div>
                        <div class="stat-label">Announcements</div>
                        <a th:href="@{/manager/announcements}"
                            class="text-xs text-warning font-bold text-decoration-none">STAY UPDATED</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Team Overview or Events -->
            <div class="col-lg-12">
                <div class="card mb-4 min-vh-50">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="mb-0 font-bold"><i class="fas fa-calendar-alt text-primary me-2"></i> Upcoming
                            Company Events</h5>
                        <span class="badge bg-light text-secondary">Manager Access</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Event Name</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="event : ${upcomingEvents}">
                                    <td class="font-bold text-primary" th:text="${event.eventDate}"></td>
                                    <td th:text="${event.title}"></td>
                                    <td><span class="text-secondary text-sm" th:text="${event.description}"></span></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(upcomingEvents)}">
                                    <td colspan="3" class="text-center py-5 text-secondary">
                                        <i class="fas fa-calendar-times mb-3 fs-1 d-block opacity-25"></i>
                                        No upcoming events scheduled.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
