<!DOCTYPE html>
<html>

<head>
    <title>Manager Dashboard</title>
</head>

<body>
    <h2>Welcome Manager</h2>

    <a th:href="@{/notifications}"
        style="display:inline-block; margin-bottom: 15px; background: #e0f7fa; padding: 5px 10px; border-radius: 5px; text-decoration: none; color: #006064; font-weight: bold;">
        🔔 Notifications (<span th:text="${unreadCount}"></span>)
    </a>
    <br />

    <a th:href="@{/manager/profile}"
        style="background: #e3f2fd; padding: 5px 10px; border-radius: 5px; text-decoration: none; display: inline-block; margin-bottom: 15px;">
        👤 My Profile
    </a>
    <br />

    <a th:href="@{/manager/announcements}">
        View Announcements
    </a>
    <br />
    <a th:href="@{/manager/leave-requests}">
        Manage Leave Requests
    </a>
    <br />
    <a th:href="@{/manager/assign-goal}"
        style="background: #e3f2fd; padding: 5px 10px; border-radius: 5px; text-decoration: none; display: inline-block; margin-bottom: 15px;">
        🎯 Assign Goal
    </a>
    <br />
    <a th:href="@{/manager/write-review}"
        style="background: #e3f2fd; padding: 5px 10px; border-radius: 5px; text-decoration: none; display: inline-block; margin-bottom: 15px;">
        📝 Write Performance Review
    </a>
    <br />
    <a th:href="@{/manager/apply-leave}">
        Apply for Leave
    </a>
    <br />
    <a th:href="@{/manager/my-leaves}">
        View My Leaves
    </a>
    <br />
    <a th:href="@{/manager/leave-balances}">
        View Leave Balances
    </a>
    <br />

    <hr>
    <h3>Upcoming Events</h3>
    <ul th:if="${not #lists.isEmpty(upcomingEvents)}">
        <li th:each="event : ${upcomingEvents}">
            <strong th:text="${event.eventDate}"></strong> -
            <span th:text="${event.title}"></span>
            <em th:if="${event.description != null and !event.description.isEmpty()}"
                th:text="'(' + ${event.description} + ')'"></em>
        </li>
    </ul>
    <p th:if="${#lists.isEmpty(upcomingEvents)}">No upcoming events!</p>
    <br>
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-danger">Logout</button>
    </form>
</body>

</html>
