<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::head}, ~{::content}, 'leave-balances')}">

<head>
    <title>Personal Entitlements | Manager Portal</title>
</head>

<body>
    <div th:fragment="content">
        <div class="mb-4 text-md-start">
            <h2 class="mb-0">My Leave Portfolio</h2>
            <p class="text-secondary mb-0">Overview of your personal available time-off balances.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4" th:each="balance : ${balances}">
                <div class="card border-0 shadow-sm h-100 border-top border-4"
                    th:classappend="${balance.balanceDays < 3 ? 'border-danger' : 'border-primary'}">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="text-xs font-bold text-uppercase text-secondary mb-0"
                                th:text="${balance.leaveType.leaveName}">Category</h6>
                            <i class="fas fa-chart-pie text-secondary opacity-50"></i>
                        </div>

                        <div class="d-flex align-items-baseline gap-2">
                            <span class="display-6 font-bold text-dark" th:text="${balance.balanceDays}">0</span>
                            <span class="text-secondary text-sm">/ [[${balance.leaveType.maxPerYear}]] Days</span>
                        </div>

                        <div class="progress mt-3" style="height: 6px;">
                            <div class="progress-bar" role="progressbar"
                                th:style="'width: ' + (${balance.balanceDays} * 100 / ${balance.leaveType.maxPerYear}) + '%'"
                                th:classappend="${balance.balanceDays < 3 ? 'bg-danger' : 'bg-primary'}"></div>
                        </div>

                        <div class="mt-4 pt-2 text-xs text-muted border-top d-flex align-items-center">
                            <i class="fas fa-sync-alt me-2"></i>
                            Balance verified on: <span class="ms-1 font-bold text-dark"
                                th:text="${#temporals.format(balance.lastModifiedDate ?: balance.createdDate, 'dd MMM, yyyy')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
