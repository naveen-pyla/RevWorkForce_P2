<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RevWorkforce</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(37, 99, 235, 0.05) 0%, transparent 40%);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--primary);
            color: white;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            border: 1px solid #e2e8f0;
            background-color: #f1f5f9;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            border-color: var(--primary);
            background-color: #fff;
        }

        .btn-primary {
            background-color: var(--primary);
            border: none;
            border-radius: 0.75rem;
            padding: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .alert {
            border-radius: 0.75rem;
            font-size: 0.875rem;
            border: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-rocket"></i>
        </div>

        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1">Welcome Back</h3>
            <p class="text-muted">RevWorkforce Portal Access</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-3">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span>Invalid credentials provided.</span>
        </div>

        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center mb-3">
            <i class="fas fa-check-circle me-2"></i>
            <span>Successfully logged out.</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label text-sm fw-semibold">Email Address</label>
                <div class="input-group">
                    <input type="email" name="username" class="form-control" placeholder="name@revworkforce.com"
                        required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-sm fw-semibold">Secure Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3 shadow-sm">
                Sign In to Account
            </button>

            <p class="text-center text-xs text-secondary mt-4">
                <i class="fas fa-lock me-1"></i> Enterprise Grade Security Active
            </p>
        </form>
    </div>

</body>

</html>
