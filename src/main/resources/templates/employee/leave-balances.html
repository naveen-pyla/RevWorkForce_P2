<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::head}, ~{::content}, 'leave-balances')}">

<head>
    <title>My Account Entitlements | RevWorkforce</title>
</head>

<body>
    <div th:fragment="content">
        <div class="mb-4">
            <h2 class="mb-0">Leave Entitlements</h2>
            <p class="text-secondary mb-0">Current available balances for your time-off categories.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4" th:each="balance : ${balances}">
                <div class="card border-0 shadow-sm h-100 overflow-hidden">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div class="stat-icon bg-light text-primary" style="width: 48px; height: 48px;">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                            <span class="badge bg-soft-primary text-primary text-xs px-2 py-1"
                                th:text="${'Max: ' + balance.leaveType.maxPerYear + ' Days'}"></span>
                        </div>

                        <h5 class="font-bold text-dark mb-1" th:text="${balance.leaveType.leaveName}">SICK LEAVE</h5>
                        <div class="display-5 font-bold text-primary mb-2" th:text="${balance.balanceDays}">12</div>
                        <p class="text-xs text-secondary mb-0">Days Remaining</p>

                        <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                            <span class="text-xs text-muted italic">
                                <i class="fas fa-history me-1"></i> Last Dynamic Update:
                            </span>
                            <span class="text-xs font-bold text-dark"
                                th:text="${#temporals.format(balance.lastModifiedDate ?: balance.createdDate, 'dd MMM yyyy')}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(balances)}" class="col-12">
                <div class="card p-5 text-center text-secondary">
                    <i class="fas fa-folder-open fs-1 mb-3 opacity-25"></i>
                    No leave balances found for your account. Please contact HR.
                </div>
            </div>
        </div>

        <style>
            .bg-soft-primary {
                background-color: rgba(37, 99, 235, 0.1);
            }
        </style>
    </div>
</body>

</html>
