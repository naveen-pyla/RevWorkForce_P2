<form th:action="@{/employee/apply-leave}"
      th:object="${leaveApplication}"
      method="post">

    <label>Leave Type:</label>
    <select th:field="*{leaveType}">
        <option th:each="type : ${leaveTypes}"
                th:value="${type.leaveTypeId}"
                th:text="${type.leaveName}">
        </option>
    </select>

    <br><br>

    <label>Start Date:</label>
    <input type="date" th:field="*{startDate}" required/>

    <br><br>

    <label>End Date:</label>
    <input type="date" th:field="*{endDate}" required/>

    <br><br>

    <label>Reason:</label>
    <textarea th:field="*{reason}" required></textarea>

    <br><br>

    <button type="submit">Apply</button>
</form>
