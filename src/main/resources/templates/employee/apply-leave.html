<form th:action="@{/employee/apply-leave}" th:object="${leaveApplication}" method="post">

    <div class="mb-3">
        <label class="form-label">Leave Type:</label>
        <select class="form-select" th:field="*{leaveType}">
            <option th:each="type : ${leaveTypes}" th:value="${type.leaveTypeId}" th:text="${type.leaveName}">
            </option>
        </select>
        <div class="text-danger" th:if="${#fields.hasErrors('leaveType')}" th:errors="*{leaveType}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Start Date:</label>
        <input type="date" class="form-control" th:field="*{startDate}" />
        <div class="text-danger" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">End Date:</label>
        <input type="date" class="form-control" th:field="*{endDate}" />
        <div class="text-danger" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Reason:</label>
        <textarea class="form-control" th:field="*{reason}" placeholder="Why do you need leave?"></textarea>
        <div class="text-danger" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
    </div>

    <button type="submit" class="btn btn-primary">Submit Application</button>
</form>

<br><br>
<a th:href="@{/employee/dashboard}">Back to Dashboard</a>
