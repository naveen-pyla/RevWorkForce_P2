<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>System Interruption | RevWorkforce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --soft-bg: #f8fbff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 650px;
            width: 100%;
            border: 0;
            text-align: center;
            padding: 60px 40px;
        }

        .error-icon {
            font-size: 5rem;
            background: #fff5f5;
            color: #dc3545;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 30px;
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.1);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #1a1e21;
            margin-bottom: 5px;
            font-size: 2.5rem;
        }

        .sub-header {
            color: #6c757d;
            font-weight: 500;
            margin-bottom: 40px;
            font-size: 1.15rem;
        }

        .error-box {
            background: #fdfdfd;
            border: 1px dashed rgba(220, 53, 69, 0.4);
            border-left: 5px solid #dc3545;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 40px;
            text-align: left;
        }

        .error-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #dc3545;
            margin-bottom: 10px;
            display: block;
        }

        .error-message {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0;
        }

        .btn-action {
            padding: 14px 40px;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.2);
        }

        .btn-outline-secondary {
            border: 2px solid #dee2e6;
            color: #4a5568;
        }

        .btn-outline-secondary:hover {
            background: #f8f9fa;
            border-color: #adb5bd;
            color: #2d3748;
        }

        .support-link {
            display: block;
            margin-top: 40px;
            color: #adb5bd;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .support-link:hover {
            color: #6c757d;
        }
    </style>
</head>

<body>

    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1>System Interruption</h1>
        <p class="sub-header">The request could not be completed as expected.</p>

        <div class="error-box">
            <span class="error-label"><i class="fas fa-terminal me-2"></i> ERROR TRACEBACK</span>
            <p class="error-message"
                th:text="${message ?: 'The resource you are looking for might have been removed, had its name changed, or is temporarily unavailable.'}">
                An unexpected error occurred.</p>
        </div>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
            <button onclick="window.history.back()" class="btn btn-outline-secondary btn-action px-5">
                <i class="fas fa-arrow-left me-2"></i> RESUME PREVIOUS SESSION
            </button>
            <a th:href="@{/dashboard}" class="btn btn-primary btn-action px-5 shadow-sm">
                <i class="fas fa-home me-2 text-warning"></i> SECURE CONTROL CENTER
            </a>
        </div>

        <a href="#" class="support-link">
            <i class="fas fa-headset me-2"></i> Report this technical issue to Workforce IT Support
        </a>
    </div>

</body>

</html>
