<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Error - RevWorkforce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            margin-top: 100px;
            text-align: center;
        }

        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: #dc3545;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container error-container">
        <div class="card shadow p-5 mx-auto" style="max-width: 600px;">
            <h1 class="error-code">Oops!</h1>
            <h3 class="mb-4 text-secondary">Something went wrong.</h3>

            <div class="alert alert-danger" role="alert">
                <h5 class="alert-heading">Error Details</h5>
                <p class="mb-0" th:text="${errorMessage}">An unexpected error occurred.</p>
            </div>

            <div class="mt-4">
                <button onclick="window.history.back()" class="btn btn-secondary me-2">Go Back</button>
                <a th:href="@{/login}" class="btn btn-primary">Go to Home</a>
            </div>
        </div>
    </div>

</body>

</html>
